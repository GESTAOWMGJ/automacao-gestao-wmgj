name: Deploy Apps Script WMGJ

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.gs'
      - 'appsscript.json'
      - '.github/workflows/deploy-appscript.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Push code to Google Apps Script
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.APPS_SCRIPT_ID }}" || (echo "Missing APPS_SCRIPT_ID secret" && exit 1)
          test -n "${{ secrets.CLASPRC_JSON }}" || (echo "Missing CLASPRC_JSON secret" && exit 1)

      - name: Configure clasp credentials
        run: |
          cat > ~/.clasprc.json <<'EOF'
          ${{ secrets.CLASPRC_JSON }}
          EOF

      - name: Prepare Apps Script project files
        run: |
          mkdir -p build-appscript
          cp appsscript.json build-appscript/appsscript.json
          cp src/*.gs build-appscript/
          cat > build-appscript/.clasp.json <<EOF
          {
            "scriptId": "${{ secrets.APPS_SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push to Apps Script
        working-directory: build-appscript
        run: clasp push --force

      - name: Create Apps Script version
        working-directory: build-appscript
        run: clasp version "GitHub Actions deploy $GITHUB_SHA" || true
