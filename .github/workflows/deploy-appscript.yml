name: Deploy Apps Script WMGJ

on:
  push:
    branches:
      - main
    paths:
      - 'src/**/*.gs'
      - 'tools/**/*.js'
      - 'appsscript.json'
      - '.github/workflows/deploy-appscript.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Push code to Google Apps Script
    runs-on: ubuntu-latest
    env:
      APPS