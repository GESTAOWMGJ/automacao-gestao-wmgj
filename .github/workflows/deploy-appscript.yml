name: Deploy Apps Script

on:
  push:
    branches:
      - main
    paths:
      - 'apps-script/**'
      - '.github/workflows/deploy-appscript.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp

      - name: Configure clasp auth
        run: echo '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Configure script id
        run: |
          cat > apps-script/.clasp.json <<EOF
          {
            "scriptId": "${{ secrets.APPS_SCRIPT_ID }}",
            "rootDir": "."
          }
          EOF

      - name: Push Apps Script
        working-directory: apps-script
        run: clasp push --force
